<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subcategories - Shining Horizon Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/logo/Shinning_Horizon_logo.png" type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <aside class="sidebar" id="admin-sidebar">
        <div class="sidebar-header">
            <a href="index.html"><img src="/static/logo/Shinning_Horizon_logo.png" alt="Shining Horizon" class="sidebar-logo-img"></a>
            <button class="sidebar-close-btn" onclick="toggleSidebar()" aria-label="Collapse sidebar" title="Collapse sidebar">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">Dashboard</a>
            <div class="nav-section">Catalog</div>
            <a href="categories.html" class="nav-item">Categories</a>
            <a href="subcategories.html" class="nav-item active">Subcategories</a>
            <a href="products.html" class="nav-item">Products</a>
            <a href="brands.html" class="nav-item">Brands</a>
            <a href="import.html" class="nav-item" data-permission="delete">Import Data</a>
            <div class="nav-section">System</div>
            <a href="users.html" class="nav-item" data-permission="users">Users</a>
            <a href="audit.html" class="nav-item" data-permission="audit">Audit Log</a>
            <a href="#" class="nav-item" onclick="event.preventDefault(); authAPI.logout()">Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-left">                <h1 class="header-title">Subcategories</h1>
            </div>
            <div class="header-right">
                <div class="user-menu">
                    <div class="user-avatar">A</div>
                    <div class="user-info"><div class="user-name">Admin</div><div class="user-role">Super Admin</div></div>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">All Subcategories</h3>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Add Subcategory
                    </button>
                </div>
                <div class="card-body">
                    <div class="filters">
                        <select id="filter-category" class="filter-select" onchange="loadSubcategories()">
                            <option value="">All Categories</option>
                        </select>
                        <select id="filter-status" class="filter-select" onchange="loadSubcategories()">
                            <option value="">All Statuses</option>
                            <option value="published">Published</option>
                            <option value="draft">Draft</option>
                        </select>
                    </div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th class="col-img" style="width:8%;">Image</th>
                                    <th style="width:22%;">Name</th>
                                    <th style="width:18%;">Category</th>
                                    <th class="num" style="width:12%;">Products</th>
                                    <th style="width:12%;">Status</th>
                                    <th style="width:28%;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="subcategories-table">
                                <tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="subcategory-modal">
        <div class="modal" style="max-width: 720px;">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Add Subcategory</h3>
                <div style="display:flex; gap:12px; align-items:center;">
                    <a id="preview-link" class="preview-link" target="_blank" rel="noopener" style="display:none">Preview ↗</a>
                    <button class="modal-close" onclick="closeModal('subcategory-modal')">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>
            <form id="subcategory-form" onsubmit="saveSubcategory(event)">
                <div class="modal-body">
                    <input type="hidden" name="id" id="subcategory-id">

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group">
                            <label class="form-label">Category *</label>
                            <select name="category_id" id="modal-category" class="form-select" required></select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Status *</label>
                            <select name="status" class="form-select" required>
                                <option value="draft">Draft</option>
                                <option value="published">Published</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Name *</label>
                        <input type="text" name="name" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-textarea"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Subcategory Image</label>
                        <div class="image-upload" onclick="document.getElementById('image-input').click()">
                            <input type="file" id="image-input" accept="image/*" onchange="handleImageUpload(this)">
                            <div id="image-preview"></div>
                        </div>
                        <input type="hidden" name="image" id="image-path">
                    </div>

                    <div class="form-section">
                        <h4>SEO</h4>
                        <div class="form-group">
                            <label class="form-label">Meta Title</label>
                            <input type="text" name="meta_title" class="form-input" maxlength="160">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Meta Description</label>
                            <textarea name="meta_description" class="form-textarea" maxlength="320"></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="form-group">
                                <label class="form-label">Display Order</label>
                                <input type="number" name="display_order" class="form-input" value="0">
                            </div>
                            <div class="form-group" style="display:flex; align-items:flex-end;">
                                <label class="form-label"><input type="checkbox" name="is_active" checked> Active</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('subcategory-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/image-drop.js"></script>
    <script src="assets/js/quick-add.js"></script>
    <script>
        if (!requireAuth()) {}

        let categories = [];
        let subcategories = [];

        document.addEventListener('DOMContentLoaded', async () => {
            initUserInfo();
            applyRoleGates();
            renderBlankPreview();
            await loadCategories();
            QuickAdd.init({
                mode: 'subcategory',
                selects: { category: 'modal-category' },
                getCategoriesList: () => categories,
                reloadCategories: loadCategories,
            });
            const uploadZone = document.querySelector('#subcategory-form .image-upload');
            if (uploadZone) {
                wireImageDropZone(uploadZone, {
                    onFiles: (files) => uploadSubcategoryImage(files[0]),
                });
            }
            await loadSubcategories();
        });

        function blankPreview() {
            return `<svg width="40" height="40" fill="none" stroke="#9ca3af" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>${typeof imageUploadHint === 'function' ? imageUploadHint() : '<p style="margin-top: 8px; color: #64748b; font-size: 0.875rem;">Click or drag image here</p>'}`;
        }
        function renderBlankPreview() { document.getElementById('image-preview').innerHTML = blankPreview(); }

        async function loadCategories() {
            categories = await categoriesAPI.getAll();
            const detailed = categories.filter(c => c.type === 'detailed');
            const filterSelect = document.getElementById('filter-category');
            filterSelect.innerHTML = '<option value="">All Categories</option>' +
                detailed.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
            const modalSelect = document.getElementById('modal-category');
            modalSelect.innerHTML = '<option value="">Select Category</option>' +
                detailed.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
        }

        async function loadSubcategories() {
            const categoryId = document.getElementById('filter-category').value || null;
            const status = document.getElementById('filter-status').value || null;
            try {
                subcategories = await subcategoriesAPI.getAll(categoryId, { status });
                renderSubcategories();
            } catch (e) {
                showToast('Failed to load subcategories: ' + e.message, 'error');
            }
        }

        function renderSubcategories() {
            const tbody = document.getElementById('subcategories-table');
            if (!subcategories.length) {
                showEmptyState(tbody, 'No subcategories found');
                return;
            }
            tbody.innerHTML = subcategories.map(sub => {
                const cat = categories.find(c => c.id === sub.category_id);
                const composite = cat ? `${cat.slug}/${sub.slug}` : null;
                // Subcategory URL is composite (cat-slug/sub-slug). Reuse previewUrl()
                // to get the ?preview=1 suffix when status !== published.
                const viewHref = composite ? previewUrl('subcategory', composite, sub.status) : null;
                const viewLabel = sub.status === 'published' ? 'View' : 'Preview';
                return `
                <tr>
                    <td class="col-img">
                        ${sub.image
                            ? `<img src="${adminImageUrl(sub.image, 'thumb')}" class="image-preview" alt="${escapeHtml(sub.name)}">`
                            : '<div class="image-preview" style="background:#f1f5f9; display:flex; align-items:center; justify-content:center; color:#94a3b8;">No img</div>'}
                    </td>
                    <td class="wrap"><strong>${escapeHtml(sub.name)}</strong><br><small style="color:#64748b;">${sub.slug}</small></td>
                    <td>${escapeHtml(sub.category_name || '-')}</td>
                    <td class="num">${sub.product_count || 0}</td>
                    <td>${renderStatusPill(sub.status, sub.is_active)}</td>
                    <td>
                        <div class="table-actions">
                            ${viewHref ? `<a href="${viewHref}" target="_blank" rel="noopener" class="btn btn-sm btn-secondary" title="${sub.status === 'published' ? 'Open public page' : 'Preview draft (admin only)'}">${viewLabel}</a>` : ''}
                            <button class="btn btn-sm btn-secondary" onclick="editSubcategory(${sub.id})">Edit</button>
                            ${canDelete() ? `<button class="btn btn-sm btn-danger" onclick="deleteSubcategory(${sub.id})">Delete</button>` : ''}
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Add Subcategory';
            resetForm('subcategory-form');
            document.getElementById('subcategory-id').value = '';
            document.getElementById('image-path').value = '';
            renderBlankPreview();
            document.getElementById('preview-link').style.display = 'none';
            document.querySelector('select[name="status"]').value = 'draft';
            openModal('subcategory-modal');
        }

        function editSubcategory(id) {
            const sub = subcategories.find(s => s.id === id);
            if (!sub) return;
            document.getElementById('modal-title').textContent = 'Edit Subcategory';
            document.getElementById('subcategory-id').value = sub.id;
            document.getElementById('image-path').value = sub.image || '';

            const preview = document.getElementById('image-preview');
            if (sub.image) {
                preview.innerHTML = `<img src="${adminImageUrl(sub.image, 'card')}" style="max-width:100%; max-height:150px; border-radius:8px;">`;
            } else {
                preview.innerHTML = blankPreview();
            }

            fillForm('subcategory-form', sub);

            const cat = categories.find(c => c.id === sub.category_id);
            const link = document.getElementById('preview-link');
            if (cat) {
                link.href = `/category/${cat.slug}/${sub.slug}`;
                link.style.display = '';
            } else {
                link.style.display = 'none';
            }

            openModal('subcategory-modal');
        }

        async function saveSubcategory(e) {
            e.preventDefault();
            const id = document.getElementById('subcategory-id').value;
            const data = getFormData('subcategory-form');
            delete data.id;
            const imagePath = document.getElementById('image-path').value;
            if (imagePath) data.image = imagePath;
            ['meta_title', 'meta_description'].forEach(k => { if (!data[k]) delete data[k]; });
            try {
                if (id) {
                    await subcategoriesAPI.update(id, data);
                    showToast('Subcategory updated');
                } else {
                    await subcategoriesAPI.create(data);
                    showToast('Subcategory created');
                }
                closeModal('subcategory-modal');
                await loadSubcategories();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function uploadSubcategoryImage(file) {
            if (!file) return;
            const preview = document.getElementById('image-preview');
            preview.innerHTML = '<div class="spinner"></div>';
            try {
                const result = await uploadAPI.uploadImage(file, 'subcategories');
                document.getElementById('image-path').value = result.path;
                preview.innerHTML = `<img src="${adminImageUrl(result.path, 'card')}" style="max-width:100%; max-height:150px; border-radius:8px;">`;
                showToast('Image uploaded');
            } catch (error) {
                preview.innerHTML = `<p style="color:#dc2626;">Upload failed: ${error.message}</p>`;
                showToast('Upload failed', 'error');
            }
        }

        async function handleImageUpload(input) {
            const file = input.files?.[0];
            if (file) await uploadSubcategoryImage(file);
            input.value = '';
        }

        async function deleteSubcategory(id) {
            if (!await confirmDialog('Delete this subcategory?')) return;
            try {
                await subcategoriesAPI.delete(id);
                showToast('Subcategory deleted');
                await loadSubcategories();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
    </script>
</body>
</html>
