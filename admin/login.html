<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shining Horizon Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/logo/Shinning_Horizon_logo.png" type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <h1>Shining <span>Horizon</span></h1>
                <p style="color: #64748b; margin-top: 8px;">Admin Dashboard</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" placeholder="Enter username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Enter password" required autocomplete="current-password">
                </div>

                <div id="login-error" style="color: #dc2626; font-size: 0.875rem; margin-bottom: 16px; display: none;"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                    <span id="login-btn-text">Sign In</span>
                    <div id="login-spinner" class="spinner" style="width: 20px; height: 20px; display: none;"></div>
                </button>
            </form>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        // If a user record is cached AND the cookie is still valid, jump to dashboard.
        if (isLoggedIn()) {
            authAPI.getMe()
                .then(() => { window.location.href = 'index.html'; })
                .catch(() => clearCachedUser());
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = e.target.username.value;
            const password = e.target.password.value;
            const errorEl = document.getElementById('login-error');
            const btnText = document.getElementById('login-btn-text');
            const spinner = document.getElementById('login-spinner');

            btnText.style.display = 'none';
            spinner.style.display = 'block';
            errorEl.style.display = 'none';

            try {
                await authAPI.login(username, password);
                window.location.href = 'index.html';
            } catch (error) {
                errorEl.textContent = error.message || 'Invalid username or password';
                errorEl.style.display = 'block';
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
