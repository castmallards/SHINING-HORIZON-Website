<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands - Shining Horizon Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/logo/Shinning_Horizon_logo.png" type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <aside class="sidebar" id="admin-sidebar">
        <div class="sidebar-header">
            <a href="index.html"><img src="/static/logo/Shinning_Horizon_logo.png" alt="Shining Horizon" class="sidebar-logo-img"></a>
            <button class="sidebar-close-btn" onclick="toggleSidebar()" aria-label="Collapse sidebar" title="Collapse sidebar">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">Dashboard</a>
            <div class="nav-section">Catalog</div>
            <a href="categories.html" class="nav-item">Categories</a>
            <a href="subcategories.html" class="nav-item">Subcategories</a>
            <a href="products.html" class="nav-item">Products</a>
            <a href="brands.html" class="nav-item active">Brands</a>
            <a href="import.html" class="nav-item" data-permission="delete">Import Data</a>
            <div class="nav-section">System</div>
            <a href="users.html" class="nav-item" data-permission="users">Users</a>
            <a href="audit.html" class="nav-item" data-permission="audit">Audit Log</a>
            <a href="#" class="nav-item" onclick="event.preventDefault(); authAPI.logout()">Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-left">                <h1 class="header-title">Brands</h1>
            </div>
            <div class="header-right">
                <div class="user-menu">
                    <div class="user-avatar">A</div>
                    <div class="user-info"><div class="user-name">Admin</div><div class="user-role">Super Admin</div></div>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">All Brands</h3>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Add Brand
                    </button>
                </div>
                <div class="card-body">
                    <div class="filters" style="margin-bottom: 12px;">
                        <select id="filter-status" class="filter-select" onchange="loadBrands()">
                            <option value="">All Statuses</option>
                            <option value="published">Published</option>
                            <option value="draft">Draft</option>
                        </select>
                    </div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th class="col-img" style="width:8%;">Logo</th>
                                    <th style="width:22%;">Name</th>
                                    <th style="width:16%;">Country</th>
                                    <th class="num" style="width:12%;">Products</th>
                                    <th style="width:12%;">Status</th>
                                    <th style="width:30%;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="brands-table">
                                <tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="brand-modal">
        <div class="modal" style="max-width: 720px;">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Add Brand</h3>
                <div style="display:flex; gap:12px; align-items:center;">
                    <a id="preview-link" class="preview-link" target="_blank" rel="noopener" style="display:none">Preview ↗</a>
                    <button class="modal-close" onclick="closeModal('brand-modal')">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>
            <form id="brand-form" onsubmit="saveBrand(event)">
                <div class="modal-body">
                    <input type="hidden" name="id" id="brand-id">

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group">
                            <label class="form-label">Brand Name *</label>
                            <input type="text" name="name" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Status *</label>
                            <select name="status" class="form-select" required>
                                <option value="draft">Draft</option>
                                <option value="published">Published</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Brand Logo</label>
                        <div class="image-upload" onclick="document.getElementById('logo-input').click()">
                            <input type="file" id="logo-input" accept="image/*" onchange="handleLogoUpload(this)">
                            <div id="logo-preview"></div>
                        </div>
                        <input type="hidden" name="logo" id="logo-path">
                    </div>

                    <div class="form-section">
                        <h4>Brand details</h4>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-textarea" placeholder="A short description of the brand"></textarea>
                        </div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="form-group">
                                <label class="form-label">Website URL</label>
                                <input type="url" name="website_url" class="form-input" placeholder="https://www.example.com">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Country of origin</label>
                                <input type="text" name="country" class="form-input" placeholder="Germany">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="form-group">
                                <label class="form-label">Display Order</label>
                                <input type="number" name="display_order" class="form-input" value="0">
                            </div>
                            <div class="form-group" style="display:flex; align-items:flex-end;">
                                <label class="form-label"><input type="checkbox" name="is_active" checked> Active</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('brand-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Brand</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/image-drop.js"></script>
    <script>
        if (!requireAuth()) {}

        let brands = [];

        document.addEventListener('DOMContentLoaded', async () => {
            initUserInfo();
            applyRoleGates();
            renderBlankPreview();
            const uploadZone = document.querySelector('#brand-form .image-upload');
            if (uploadZone) {
                wireImageDropZone(uploadZone, {
                    onFiles: (files) => uploadBrandLogo(files[0]),
                });
            }
            await loadBrands();
        });

        function blankPreview() {
            return `<svg width="40" height="40" fill="none" stroke="#9ca3af" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>${typeof imageUploadHint === 'function' ? imageUploadHint().replace('image', 'logo') : '<p style="margin-top: 8px; color: #64748b; font-size: 0.875rem;">Click or drag logo here</p>'}`;
        }
        function renderBlankPreview() { document.getElementById('logo-preview').innerHTML = blankPreview(); }

        async function loadBrands() {
            try {
                const status = document.getElementById('filter-status').value || null;
                brands = await brandsAPI.getAll({ status });
                renderBrands();
            } catch (error) {
                showToast('Failed to load brands: ' + error.message, 'error');
            }
        }

        function renderBrands() {
            const tbody = document.getElementById('brands-table');
            if (!brands.length) {
                showEmptyState(tbody, 'No brands found');
                return;
            }
            tbody.innerHTML = brands.map(b => `
                <tr>
                    <td class="col-img">
                        ${b.logo
                            ? `<img src="${adminImageUrl(b.logo, 'thumb')}" class="image-preview" alt="${escapeHtml(b.name)}">`
                            : '<div class="image-preview" style="background:#f1f5f9; display:flex; align-items:center; justify-content:center; color:#94a3b8;">No logo</div>'}
                    </td>
                    <td class="wrap"><strong>${escapeHtml(b.name)}</strong><br><small style="color:#64748b;">${b.slug}</small></td>
                    <td>${escapeHtml(b.country || '-')}</td>
                    <td>${b.product_count || 0}</td>
                    <td>${renderStatusPill(b.status, b.is_active)}</td>
                    <td>
                        <div class="table-actions">
                            <a href="${previewUrl('brand', b.slug, b.status)}" target="_blank" rel="noopener" class="btn btn-sm btn-secondary" title="${b.status === 'published' ? 'Open public page' : 'Preview draft (admin only)'}">${b.status === 'published' ? 'View' : 'Preview'}</a>
                            <button class="btn btn-sm btn-secondary" onclick="editBrand(${b.id})">Edit</button>
                            ${canDelete() ? `<button class="btn btn-sm btn-danger" onclick="deleteBrand(${b.id})">Delete</button>` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Add Brand';
            resetForm('brand-form');
            document.getElementById('brand-id').value = '';
            document.getElementById('logo-path').value = '';
            renderBlankPreview();
            document.getElementById('preview-link').style.display = 'none';
            document.querySelector('select[name="status"]').value = 'draft';
            openModal('brand-modal');
        }

        function editBrand(id) {
            const b = brands.find(brand => brand.id === id);
            if (!b) return;
            document.getElementById('modal-title').textContent = 'Edit Brand';
            document.getElementById('brand-id').value = b.id;
            document.getElementById('logo-path').value = b.logo || '';

            const preview = document.getElementById('logo-preview');
            if (b.logo) {
                preview.innerHTML = `<img src="${adminImageUrl(b.logo, 'card')}" style="max-width:100%; max-height:150px; border-radius:8px;">`;
            } else {
                preview.innerHTML = blankPreview();
            }

            fillForm('brand-form', b);

            const link = document.getElementById('preview-link');
            link.href = previewUrl('brand', b.slug);
            link.style.display = '';

            openModal('brand-modal');
        }

        async function saveBrand(e) {
            e.preventDefault();
            const id = document.getElementById('brand-id').value;
            const data = getFormData('brand-form');
            delete data.id;
            const logoPath = document.getElementById('logo-path').value;
            if (logoPath) data.logo = logoPath;
            ['description', 'website_url', 'country'].forEach(k => { if (data[k] === '') delete data[k]; });
            try {
                if (id) {
                    await brandsAPI.update(id, data);
                    showToast('Brand updated');
                } else {
                    await brandsAPI.create(data);
                    showToast('Brand created');
                }
                closeModal('brand-modal');
                await loadBrands();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function uploadBrandLogo(file) {
            if (!file) return;
            const preview = document.getElementById('logo-preview');
            preview.innerHTML = '<div class="spinner"></div>';
            try {
                const result = await uploadAPI.uploadImage(file, 'brands');
                document.getElementById('logo-path').value = result.path;
                preview.innerHTML = `<img src="${adminImageUrl(result.path, 'card')}" style="max-width:100%; max-height:150px; border-radius:8px;">`;
                showToast('Logo uploaded');
            } catch (error) {
                preview.innerHTML = `<p style="color:#dc2626;">Upload failed: ${error.message}</p>`;
                showToast('Upload failed', 'error');
            }
        }

        async function handleLogoUpload(input) {
            const file = input.files?.[0];
            if (file) await uploadBrandLogo(file);
            input.value = '';
        }

        async function deleteBrand(id) {
            if (!await confirmDialog('Delete this brand?')) return;
            try {
                await brandsAPI.delete(id);
                showToast('Brand deleted');
                await loadBrands();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
    </script>
</body>
</html>
